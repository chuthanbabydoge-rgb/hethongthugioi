kind = "web"
previewPath = "/"
title = "Thú Giới"
version = "1.0.0"
id = "artifacts/thu-gioi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26181

[services.development]
run = "pnpm --filter @workspace/thu-gioi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/thu-gioi", "run", "build" ]
publicDir = "artifacts/thu-gioi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26181"
BASE_PATH = "/"
